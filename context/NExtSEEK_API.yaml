  /nextseek_api/sops/:
    get:
      operationId: List SOPs
      description: |
        **SUMMARY:** List all standard operating procedures (protocols) accessible to the current user.

        **USE WHEN:** The user wants to browse or list all available SOPs/protocols without knowing a specific ID.

        **ACCEPTS:** No required parameters; supports pagination query params.

        **RETURNS:** Paginated list of SOP records with titles, descriptions, associated projects, and file attachment metadata.

        **TRIGGER PHRASES:** list protocols, show SOPs, all procedures, available protocols, browse SOPs

        **EXAMPLES:**
        - 'Show me all available protocols'
        - 'What procedures are documented for sample collection?'
        - 'List all SOPs in the system'
      tags:
      - SOPs
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SopListResponse'
              examples:
                ListSops:
                  value:
                  - data:
                    - id: '131'
                      type: sops
                      attributes:
                        title: This Sop
                      relationships:
                        projects:
                          data:
                          - id: '2558'
                            type: projects
                      links:
                        self: /sops/131
                      meta: {}
                    jsonapi:
                      version: '1.0'
                    links:
                      self: /sops?page[number]=1&page[size]=100
                    meta:
                      base_url: https://fairdata-dev.mit.edu
                      api_version: v1
                  summary: List Sops
          description: ''
    post:
      operationId: Create a SOP
      description: |
        **SUMMARY:** Upload a new standard operating procedure document.

        **USE WHEN:** The user wants to register or upload a new SOP/protocol into the system.

        **ACCEPTS:** SOP data including title, content blobs (PDF, Word, etc.), policy settings, and project associations.

        **RETURNS:** The created SOP record with its assigned ID and metadata.

        **TRIGGER PHRASES:** create SOP, upload protocol, add procedure, new SOP, register protocol

        **EXAMPLES:**
        - 'Add a new necropsy protocol for the primate study'
        - 'Upload the updated sample handling procedure'
        - 'Create a new SOP for the GEX workflow'
      tags:
      - SOPs
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more files to upload as content blobs.
                metadata:
                  type: string
                  description: 'JSON string with SOP metadata. Minimum: {"data":{"type":"sops","attributes":{"title":"..."},"relationships":{"projects":{"data":[{"id":"...","type":"projects"}]}}}}
                    — content_blobs are auto-generated from uploaded files if omitted.'
                institution:
                  type: string
                  description: '3-letter institution code.Example: "WHI"'
              required:
              - metadata
          application/json:
            schema:
              $ref: '#/components/schemas/SopCreateRequest'
            examples:
              CreateSOP(JSONOnly,NoFile):
                value:
                  data:
                  - data:
                      type: sops
                      attributes:
                        title: A Maximal SOP
                        content_blobs:
                        - original_filename: a_pdf_file.pdf
                          content_type: application/pdf
                        policy:
                          access: download
                          permissions:
                          - resource:
                              id: '2558'
                              type: projects
                            access: edit
                      relationships:
                        projects:
                          data:
                          - id: '2558'
                            type: projects
                summary: Create SOP (JSON only, no file)
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SopMultiResponse'
              examples:
                CreateSOP(JSONOnly,NoFile):
                  value:
                    data:
                    - data:
                        type: sops
                        attributes:
                          title: A Maximal SOP
                          content_blobs:
                          - original_filename: a_pdf_file.pdf
                            content_type: application/pdf
                          policy:
                            access: download
                            permissions:
                            - resource:
                                id: '2558'
                                type: projects
                              access: edit
                        relationships:
                          projects:
                            data:
                            - id: '2558'
                              type: projects
                  summary: Create SOP (JSON only, no file)
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SopMultiResponse'
              examples:
                CreateSOP(JSONOnly,NoFile):
                  value:
                    data:
                    - data:
                        type: sops
                        attributes:
                          title: A Maximal SOP
                          content_blobs:
                          - original_filename: a_pdf_file.pdf
                            content_type: application/pdf
                          policy:
                            access: download
                            permissions:
                            - resource:
                                id: '2558'
                                type: projects
                              access: edit
                        relationships:
                          projects:
                            data:
                            - id: '2558'
                              type: projects
                  summary: Create SOP (JSON only, no file)
          description: ''
  /nextseek_api/sops/{uid}/:
    get:
      operationId: Fetch a SOP
      description: |
        **SUMMARY:** Fetch details for a specific protocol document by ID or name.

        **USE WHEN:** The user wants to view metadata for ONE specific SOP/protocol identified by SEEK ID or title.

        **ACCEPTS:** SOP identifier (numeric SEEK ID or title string) as path parameter; optional version query param.

        **RETURNS:** Full SOP metadata including title, description, version history, attached files, and linked projects.

        **TRIGGER PHRASES:** get SOP, fetch protocol, SOP details, protocol info, show procedure

        **EXAMPLES:**
        - 'Show me the tissue processing protocol'
        - 'What is the current version of the blood draw procedure?'
        - 'Get details for SOP 142'
      parameters:
      - in: path
        name: uid
        schema:
          type: string
        description: SEEK id (numeric) or NExtSEEK UID (string)
        required: true
      - in: query
        name: version
        schema:
          type: integer
        description: Optional SOP version to fetch
      tags:
      - SOPs
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SopSingleResponse'
              examples:
                GetSop:
                  value:
                    data:
                      id: '132'
                      type: sops
                      attributes:
                        title: A Maximal SOP
                      relationships:
                        projects:
                          data:
                          - id: '2558'
                            type: projects
                      links:
                        self: /sops/132
                      meta: {}
                    jsonapi:
                      version: '1.0'
                  summary: Get Sop
          description: ''
    patch:
      operationId: Update a SOP
      description: |
        **SUMMARY:** Revise an existing protocol document by ID or name.

        **USE WHEN:** The user wants to modify an existing SOP's title, description, files, or project associations.

        **ACCEPTS:** SOP identifier as path parameter; partial update payload with fields to change.

        **RETURNS:** The updated SOP record with all current metadata.

        **TRIGGER PHRASES:** update SOP, edit protocol, modify procedure, change SOP, revise protocol

        **EXAMPLES:**
        - 'Update the description for the imaging protocol'
        - 'Change the project association for the cell culture procedure'
        - 'Rename SOP 132 to GEX Protocol v2'
      parameters:
      - in: path
        name: uid
        schema:
          type: string
        description: SEEK id (numeric) or NExtSEEK UID (string)
        required: true
      tags:
      - SOPs
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more files to replace content blobs.
                metadata:
                  type: string
                  description: JSON string with SOP patch metadata (e.g., {"data":{"type":"sops","id":"42","attributes":{"title":"..."}}}).
                    content_blobs auto-generated from files.
              required:
              - metadata
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSopUpdateRequest'
            examples:
              PatchSOP(JSONOnly):
                value:
                  data:
                    type: sops
                    id: '132'
                    attributes:
                      title: A Maximally Patched SOP
                    relationships:
                      projects:
                        data:
                        - id: '2653'
                          type: projects
                summary: Patch SOP (JSON only)
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SopSingleResponse'
              examples:
                PatchSOP(JSONOnly):
                  value:
                    data:
                      type: sops
                      id: '132'
                      attributes:
                        title: A Maximally Patched SOP
                      relationships:
                        projects:
                          data:
                          - id: '2653'
                            type: projects
                  summary: Patch SOP (JSON only)
          description: ''
        '207':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentBlobUploadResponse'
          description: ''
  /nextseek_api/sops/download/:
    post:
      operationId: Download SOP content blob
      description: |
        **SUMMARY:** Download SOP content blobs — supports single and batch modes.

        **USE WHEN:** The user wants to download the actual file(s) attached to one or more SOPs.

        **ACCEPTS:** Single mode (JSON object): one `SopDownloadRequest` with `uid_or_id`, optional `blob_id` and `output_format`. Batch mode (JSON array): multiple `SopDownloadRequest` objects.

        **RETURNS:** Single mode: streaming binary file download. Batch mode: zip archive containing all downloaded files plus a `manifest.json`.

        **TRIGGER PHRASES:** download SOP, get protocol file, fetch procedure document, download protocol PDF, batch download SOPs

        **EXAMPLES:**
        - 'Download the GEX protocol document'
        - 'Get the DNA adducts procedure file as a PDF'
        - 'Fetch multiple protocols at once as a zip archive'
        - 'Download SOP 142 as CSV'
      tags:
      - SOPs
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          application/json:
            schema:
              type: object
              additionalProperties: {}
            examples:
              DownloadBySEEKID:
                value:
                  uid_or_id: '142'
                summary: Download by SEEK ID
                description: Download a SOP's content blob using its numeric SEEK
                  ID
              DownloadBySOPTitle/UID:
                value:
                  uid_or_id: P.ESS-251028-V1_NG_8-GEX.docx
                summary: Download by SOP title/UID
                description: Download a SOP's content blob using its NExtSEEK UID
                  (title)
              DownloadAsCSV:
                value:
                  uid_or_id: '142'
                  output_format: csv
                summary: Download as CSV
                description: 'Download content blob with CSV conversion (SEEK readContentBlob
                  with Accept: text/csv)'
              DownloadWithExplicitBlobId:
                value:
                  uid_or_id: '142'
                  blob_id: 246
                summary: Download with explicit blob_id
                description: Specify blob_id when a SOP has multiple content blobs
              BatchDownload(zip):
                value:
                - uid_or_id: '142'
                - uid_or_id: P.ESS-251028-V1_NG_8-GEX.docx
                summary: Batch download (zip)
                description: Download multiple SOPs as a zip archive
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
