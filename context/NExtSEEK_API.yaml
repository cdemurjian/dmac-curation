        **USE WHEN:** The user wants to download actual file(s) attached to one or more data files.

        **ACCEPTS:** Single mode (JSON object): one request with `uid_or_id`, optional `blob_id` and `output_format`. Batch mode (JSON array): multiple request objects.

        **RETURNS:** Single mode: streaming binary file download. Batch mode: zip archive containing all downloaded files plus a `manifest.json`.

