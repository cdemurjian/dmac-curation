  /nextseek_api/samples/advanced_search/:
    post:
      operationId: Advanced Search Samples
      description: |
        **SUMMARY:** Search samples by type, attribute filters, and text matching with pagination.

        **USE WHEN:** The user wants to SEARCH, FILTER, or QUERY samples by criteria such as sample type, attribute values, text keywords, or combinations thereof. Also use when the user wants to retrieve all samples of a given type.

        **DO NOT USE WHEN:** The user already knows specific sample UIDs/IDs and wants to bulk-export their metadata — use `POST admin/samples/retrieve` instead.

        **ACCEPTS:** Sample type(s) (name or ID), attribute(s), search text(s), `match_type` (`PARTIAL`/`EXACT`), and logic operators (`AND`/`OR`) for combining multiple attributes or search terms.

        **RETURNS:** Paginated list of matching samples with full metadata (`json_metadata`, `sample_type`, etc.).

        **TRIGGER PHRASES:** search samples, find samples, filter samples, query samples, samples where, samples matching, group samples by, compare samples

        **EXAMPLES:**
        - 'Group all monkeys by sex and necropsy date'
        - 'Find all mice from water study that were treated with NDMA'
        - 'Show me all samples associated with T cell depletion'
        - 'How many monkeys have both CT scan data and sequencing data?'
      parameters:
      - in: query
        name: debug_validation
        schema:
          type: boolean
        description: Include validation error details in 502 response
      - in: query
        name: page
        schema:
          type: integer
        description: 1-based page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Items per page (default 100, max 1000)
      tags:
      - Samples
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SampleAdvancedSearchRequest'
            examples:
              NumericSampletype:
                value:
                  sampletype: '2'
                  filter_searchText: lung
                  attribute: Organ
                  filter_matchType: PARTIAL
                summary: Numeric sampletype
              MultipleSampletypesAndSingleAttribute:
                value:
                  sampletype:
                  - TIS
                  - CEL
                  filter_searchText: lung
                  attribute: Name
                  filter_matchType: PARTIAL
                summary: Multiple sampletypes and single attribute
              AttributeListWithANDLogic:
                value:
                  sampletype:
                  - TIS
                  filter_searchText: lung
                  attribute:
                  - Organ
                  - Name
                  attribute_logic: AND
                  filter_matchType: PARTIAL
                summary: Attribute list with AND logic
              SearchTextOnly:
                value:
                  filter_searchText: CD8 Depletion
                  filter_matchType: PARTIAL
                summary: Search Text Only
              MultipleSearchTextsAND(noAttributes,NoSampleTypes):
                value:
                  filter_searchText:
                  - lung
                  - granuloma
                  searchText_logic: AND
                  filter_matchType: PARTIAL
                summary: Multiple search texts AND (no attributes, no sample types)
              MultipleSearchTextsOR(noAttributes):
                value:
                  filter_searchText:
                  - kidney
                  - Liver
                  searchText_logic: OR
                  filter_matchType: PARTIAL
                summary: Multiple search texts OR (no attributes)
              MultipleSearchTextsORWithSingleAttribute:
                value:
                  filter_searchText:
                  - lung
                  - liver
                  searchText_logic: OR
                  attribute: Organ
                  filter_matchType: PARTIAL
                summary: Multiple search texts OR with single attribute
              MultipleSearchTextsANDWithMultipleAttributes(attributeOR):
                value:
                  filter_searchText:
                  - granuloma
                  - lung
                  searchText_logic: AND
                  attribute:
                  - Organ
                  - Type
                  attribute_logic: OR
                  filter_matchType: PARTIAL
                summary: Multiple search texts AND with multiple attributes (attribute
                  OR)
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SampleAdvancedSearchRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SampleAdvancedSearchRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleAdvancedSearchResult'
              examples:
                NumericSampletype:
                  value:
                    sampletype: '2'
                    filter_searchText: lung
                    attribute: Organ
                    filter_matchType: PARTIAL
                  summary: Numeric sampletype
                MultipleSampletypesAndSingleAttribute:
                  value:
                    sampletype:
                    - TIS
                    - CEL
                    filter_searchText: lung
                    attribute: Name
                    filter_matchType: PARTIAL
                  summary: Multiple sampletypes and single attribute
                AttributeListWithANDLogic:
                  value:
                    sampletype:
                    - TIS
                    filter_searchText: lung
                    attribute:
                    - Organ
                    - Name
                    attribute_logic: AND
                    filter_matchType: PARTIAL
                  summary: Attribute list with AND logic
                SearchTextOnly:
                  value:
                    filter_searchText: CD8 Depletion
                    filter_matchType: PARTIAL
                  summary: Search Text Only
                MultipleSearchTextsAND(noAttributes,NoSampleTypes):
                  value:
                    filter_searchText:
                    - lung
                    - granuloma
                    searchText_logic: AND
                    filter_matchType: PARTIAL
                  summary: Multiple search texts AND (no attributes, no sample types)
                MultipleSearchTextsOR(noAttributes):
                  value:
                    filter_searchText:
                    - kidney
                    - Liver
                    searchText_logic: OR
                    filter_matchType: PARTIAL
                  summary: Multiple search texts OR (no attributes)
                MultipleSearchTextsORWithSingleAttribute:
                  value:
                    filter_searchText:
                    - lung
                    - liver
                    searchText_logic: OR
                    attribute: Organ
                    filter_matchType: PARTIAL
                  summary: Multiple search texts OR with single attribute
                MultipleSearchTextsANDWithMultipleAttributes(attributeOR):
                  value:
                    filter_searchText:
                    - granuloma
                    - lung
                    searchText_logic: AND
                    attribute:
                    - Organ
                    - Type
                    attribute_logic: OR
                    filter_matchType: PARTIAL
                  summary: Multiple search texts AND with multiple attributes (attribute
                    OR)
          description: ''
  /nextseek_api/sampletypes/{uid}/child_types/:
