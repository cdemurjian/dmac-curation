  /nextseek_api/evaluator/retry/:
    post:
      operationId: 'Evaluator: Execute Retry'
      description: |
        **SUMMARY:** Submit a retry query through the existing assistant pipeline, reusing the original chat session.

        **USE WHEN:** The evaluator client has inspected a run via the retry-context endpoints and wants to submit a corrected or refined query.

        **ACCEPTS:** JSON body with `query` (required), `mode` (required), and source identifiers: either `task_id` OR `session_id` + `bundle_id`. Admin-only.

        **RETURNS:** `{task_id, session_id, source_task_id, source_session_id, source_bundle_id, credential_source}` with HTTP 202.

        **NOTE:** Retry uses the admin caller's Basic auth credentials for SEEK API calls. If the admin authenticates via Token auth, the system falls back to service account credentials (API_USER/API_PASS env vars). The `credential_source` field indicates which credentials were used.

        **EXAMPLES:**
        - `POST /nextseek_api/evaluator/retry/` with `{"task_id": "abc123", "query": "Find mice treated with NDMA", "mode": "standard"}`
      tags:
      - evaluator
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RetryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RetryRequest'
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryResponse'
          description: ''
