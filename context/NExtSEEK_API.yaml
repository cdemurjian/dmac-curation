openapi: 3.1.0
info:
  title: NExtSEEK API
  version: 0.1.0
paths:
  /nextseek_api/admin/samples/retrieve/:
    post:
      operationId: Admin Sample Retrieval
      description: |
        **SUMMARY:** Export sample metadata for admin users given a list of sample identifiers.

        **USE WHEN:** An admin needs to bulk-export metadata (JSON or Excel) for specific samples they already know by UID or SEEK ID, including all parent/child derived samples.

        **DO NOT USE WHEN:** The user wants to SEARCH or FILTER samples by type, attribute, or text — use `POST advanced_search` instead.

        **ACCEPTS:** A list of sample UIDs (e.g. 'NHP-220630FLY-1-PUB') and/or SEEK IDs (numeric); optional `output_format` (`json` or `excel`).

        **RETURNS:** JSON grouped by sample type with full metadata, or an Excel workbook. Includes derived (parent/child) samples automatically.

        **TRIGGER PHRASES:** export samples, download sample metadata, admin sample retrieval, bulk sample export, sample data dump

        **EXAMPLES:**
        - 'Export all metadata for NHP-220630FLY-1-PUB and its derived samples as JSON'
        - 'Download an Excel spreadsheet with data for samples 12345 and 67890'
        - 'Get sample data for these three monkeys in JSON format'
        - 'Retrieve full metadata for tissue samples TIS-230324BOO-39-PUB and TIS-230324BOO-40-PUB'
      tags:
      - Samples
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSampleRetrieveRequest'
            examples:
              JSONOutput(default):
                value:
                  identifiers:
                  - NHP-220630FLY-1-PUB
                  - TIS-230324BOO-39-PUB
                summary: JSON output (default)
              ExcelOutputWithMixedIDs:
                value:
                  identifiers:
                  - NHP-220630FLY-1-PUB
                  - '12345'
                  output_format: excel
                summary: Excel output with mixed IDs
              SEEKIDsOnly:
                value:
                  identifiers:
                  - '12345'
                  - '67890'
                  output_format: json
                summary: SEEK IDs only
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminSampleRetrieveRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminSampleRetrieveRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSampleRetrieveResponse'
            application/vnd.ms-excel:
              schema:
                type: string
                format: binary
          description: ''
  /nextseek_api/assays/:
    get:
      operationId: List Assays
      description: |
        **SUMMARY:** List all assays (experimental procedures) accessible to the current user.

        **USE WHEN:** The user wants to browse all available assays/experiments.

        **ACCEPTS:** No required parameters; supports pagination query params.

        **RETURNS:** Paginated list of assay records with titles, types, technologies, and IDs for linked studies, samples, and data files.

        **TRIGGER PHRASES:** list assays, show experiments, all assays, available assays, browse assays

        **EXAMPLES:**
        - 'Show me all available assays'
        - 'What experimental procedures have been run on the primate samples?'
        - 'List all assays in the system'
      tags:
      - Assays
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssayListResponse'
              examples:
                ListAssays:
                  value:
                  - data:
                    - id: '351'
                      type: assays
                      attributes:
                        title: A Maximal experimental Assay
                      links:
                        self: /assays/351
                    jsonapi:
                      version: '1.0'
                    links:
                      self: /assays?page[number]=1&page[size]=100
                    meta:
                      base_url: https://fairdata-dev.mit.edu
                      api_version: v1
                  summary: List Assays
          description: ''
    post:
      operationId: Create an Assay
      description: |
        **SUMMARY:** Define a new assay (experimental procedure) within a study.

        **USE WHEN:** The user wants to create a new assay and link it to a study, samples, or protocols.

        **ACCEPTS:** Assay data including title, `assay_class`, `assay_type`, `technology_type`, and study relationship.

        **RETURNS:** The created assay with its assigned ID and metadata.

        **TRIGGER PHRASES:** create assay, new assay, add experiment, set up assay, register assay

        **EXAMPLES:**
        - 'Create a new transcriptomics assay for the immune response study'
        - 'Add a histology assay to analyze the tissue samples'
        - 'Set up a new RNA-seq experiment under study 434'
      tags:
      - Assays
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssayCreateRequest'
            examples:
              CreateAssay:
                value:
                  data:
                    type: assays
                    attributes:
                      title: A Maximal experimental Assay
                      assay_class:
                        key: EXP
                      assay_type:
                        uri: http://jermontology.org/ontology/JERMOntology#Transcriptomics
                      technology_type:
                        uri: http://jermontology.org/ontology/JERMOntology#RNA-Seq
                    relationships:
                      study:
                        data:
                          type: studies
                          id: '434'
                summary: Create Assay
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssayCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssayCreateRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssaySingleResponse'
              examples:
                CreateAssay:
                  value:
                    data:
                      type: assays
                      attributes:
                        title: A Maximal experimental Assay
                        assay_class:
                          key: EXP
                        assay_type:
                          uri: http://jermontology.org/ontology/JERMOntology#Transcriptomics
                        technology_type:
                          uri: http://jermontology.org/ontology/JERMOntology#RNA-Seq
                      relationships:
                        study:
                          data:
                            type: studies
                            id: '434'
                  summary: Create Assay
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssaySingleResponse'
              examples:
                CreateAssay:
                  value:
                    data:
                      type: assays
                      attributes:
                        title: A Maximal experimental Assay
                        assay_class:
                          key: EXP
                        assay_type:
                          uri: http://jermontology.org/ontology/JERMOntology#Transcriptomics
                        technology_type:
                          uri: http://jermontology.org/ontology/JERMOntology#RNA-Seq
                      relationships:
                        study:
                          data:
                            type: studies
                            id: '434'
                  summary: Create Assay
          description: ''
  /nextseek_api/assays/{uid}/:
    get:
      operationId: Fetch an Assay
      description: |
        **SUMMARY:** Fetch details for a specific assay by its numeric SEEK ID.

        **USE WHEN:** The user wants to view full metadata for ONE specific assay/experiment.

        **ACCEPTS:** Assay SEEK ID (numeric) as path parameter.

        **RETURNS:** Full assay metadata including title, assay type, technology, linked study, associated samples, protocols, and data files.

        **TRIGGER PHRASES:** get assay, fetch assay, assay details, experiment info, show assay

        **EXAMPLES:**
        - 'Show me the details of the RNA-seq assay'
        - 'What samples were processed in this flow cytometry experiment?'
        - 'Get assay 351'
      parameters:
      - in: path
        name: uid
        schema:
          type: string
        description: SEEK id (numeric). Non-numeric UID resolution not configured.
        required: true
      tags:
      - Assays
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssaySingleResponse'
              examples:
                GetAssay:
                  value:
                    data:
                      id: '351'
                      type: assays
                      attributes:
                        title: A Maximal experimental Assay
                      relationships:
                        study:
                          data:
                            type: studies
                            id: '434'
                      links:
                        self: /assays/351
                      meta: {}
                    jsonapi:
                      version: '1.0'
                  summary: Get Assay
          description: ''
    patch:
      operationId: Update an Assay
      description: |
        **SUMMARY:** Update an existing assay by its numeric SEEK ID.

        **USE WHEN:** The user wants to modify an assay's title, description, type, technology, or linked samples/data.

        **ACCEPTS:** Assay SEEK ID as path parameter; partial update payload with fields to change.

        **RETURNS:** The updated assay with all current metadata.

        **TRIGGER PHRASES:** update assay, edit assay, modify experiment, change assay, patch assay

        **EXAMPLES:**
        - 'Update the description for the RNA-seq assay'
        - 'Add additional samples to the flow cytometry experiment'
        - 'Change the technology type for assay 351'
      parameters:
      - in: path
        name: uid
        schema:
          type: string
        description: SEEK id (numeric). Non-numeric UID resolution not configured.
        required: true
      tags:
      - Assays
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAssayUpdateRequest'
            examples:
              PatchAssay:
                value:
                  data:
                    type: assays
                    id: '351'
                    attributes:
                      description: Revised description
                summary: Patch Assay
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAssayUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAssayUpdateRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssaySingleResponse'
              examples:
                PatchAssay:
                  value:
                    data:
                      type: assays
                      id: '351'
                      attributes:
                        description: Revised description
                  summary: Patch Assay
          description: ''
  /nextseek_api/batch-upload/:
    get:
      operationId: batch_upload_list
      description: |
        **SUMMARY:** List the authenticated user's batch upload jobs with pagination and live Celery state.

        **USE WHEN:** The user wants to see their own batch upload history, check which jobs are running, or find a specific job ID without remembering it.

        **DO NOT USE WHEN:** The user already knows a specific `job_id` and wants detailed progress — use `GET batch-upload/status/{job_id}/` instead.

        **ACCEPTS:** Optional query params: `page` (default `1`), `page_size` (default `20`, max `100`).

        **RETURNS:** Paginated list of the user's jobs, each with `job_id`, `project_id`, `created_at` (Unix timestamp), and current Celery `state` (`PENDING`, `STARTED`, `PROGRESS`, `SUCCESS`, `FAILURE`, `REVOKED`). Also includes `total` (total job count), `page`, and `page_size`. Jobs are sorted newest-first. Only returns jobs belonging to the requesting user.

        **TRIGGER PHRASES:** list batch uploads, my uploads, recent uploads, batch jobs, upload history, my jobs

        **EXAMPLES:**
        - 'Show me my recent batch upload jobs'
        - 'List all my batch uploads'
        - 'What batch jobs have I run?'
        - 'Show page 2 of my upload history'
      tags:
      - batch-upload
      security:
      - tokenAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: array
                  items:
                    type: object
          description: ''
  /nextseek_api/batch-upload/cancel/{job_id}/:
    delete:
      operationId: batch_upload_cancel_destroy
      description: |
        **SUMMARY:** Cancel (revoke) a running batch upload job.

        **USE WHEN:** The user wants to stop a batch upload job that is currently running.

        **ACCEPTS:** `job_id` as path parameter.

        **RETURNS:** `204 No Content` on success.

        **TRIGGER PHRASES:** cancel batch upload, stop upload, revoke job, abort batch, kill upload job

        **EXAMPLES:**
        - 'Cancel the batch upload job abc123'
        - 'Stop the running bulk upload'
        - 'Abort the batch job'
      parameters:
      - in: path
        name: job_id
        schema:
          type: string
        required: true
      tags:
      - batch-upload
      security:
      - tokenAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /nextseek_api/batch-upload/start/:
    post:
      operationId: batch_upload_start_create
      description: |
        **SUMMARY:** Start a batch upload job for bulk sample creation from Excel files or direct row data.

        **USE WHEN:** An authenticated user wants to bulk-create many samples at once.

        **DO NOT USE WHEN:** The user wants to create a single sample -- use `POST samples/` instead.

        **ACCEPTS:** Two input modes (if both provided, rows takes priority):
        1. **Direct rows** (application/json): `rows` array of InputRowModel objects -- bypasses Excel parsing
        2. **File upload** (multipart/form-data): one or more `.xlsx` files under the `file` key

        Also requires: `project_id` (required top-level; per-row project_id can override); optional `person_id` (defaults to authenticated user); optional `update_existing` (default false); optional `neo4j_only` (default false -- skip SQL INSERT, sync only to Neo4j; assumes samples already exist in DB with pre-assigned UIDs); optional `config_overrides` (JSON object).

        **RETURNS:** `job_id` (Celery task ID) and initial status `queued`.

        **FILE SIZE LIMIT:** Total upload size must not exceed 200 MB (configurable via `BATCH_UPLOAD_MAX_TOTAL_BYTES` env var). Returns 413 if exceeded. Only applies to file upload mode.

        **ERROR CODES:**
        - 400: Missing input, structural errors (no files/rows, missing project_id)
        - 401: Authentication required
        - 413: Total upload size exceeds limit (file upload mode only)
        - 422: Pydantic validation error on rows or request body

        **TRIGGER PHRASES:** batch upload, bulk create samples, upload spreadsheet, bulk sample import, batch sample creation, upload Excel, multi-file upload, programmatic sample creation, neo4j only, neo4j sync, re-sync neo4j, graph sync

        **EXAMPLES:**
        - 'Upload these Excel files to create samples in bulk for project 4475'
        - 'Programmatically create 500 samples via the API'
        - `curl -u user:pass -F 'file=@samples.xlsx' -F 'project_id=4475' https://host/nextseek_api/batch-upload/start/`
        - `curl -u user:pass -H 'Content-Type: application/json' -d '{"project_id": 4475, "rows": [{"SampleType": "M.Mice", "json_metadata": {"Name": "mouse1"}}]}' https://host/nextseek_api/batch-upload/start/`

        ---

        ## Input Mode 1: Direct Rows (application/json)

        Send a JSON body with a `rows` array. Each element is an InputRowModel:
        ```json
        {"project_id": 4475, "rows": [
          {"SampleType": "M.Mice", "json_metadata": {"Name": "mouse1", "Strain": "C57BL/6"}},
          {"SampleType": "M.Mice", "json_metadata": {"Name": "mouse2", "Strain": "BALB/c"}}
        ]}
        ```
        Skips Excel parsing entirely. Validated via Pydantic in the view (returns 422 on failure).
        **Note:** Ontology validation is not performed in rows mode.

        **Required per row:** `SampleType` (str), `json_metadata` (str or dict)
        **Optional:** `UID`, `assay_ids`, `project_id` (overrides top-level), `study_title`, `study_id`, `sop_id`, `assay_titles`

        ## Input Mode 2: File Upload (multipart/form-data)

        Upload one or more Excel (.xlsx) files via the `file` field. Format is auto-detected per file.

        ### Flat Format (single sheet)

        - **uid** -- Sample UID. Leave empty for auto-generation.
        - **sampletype** -- Sample type name (alias: `sample_type`)
        - **json_metadata** -- JSON metadata string (alias: `jsonmetadata`)
        - **assay_ids** -- Comma-separated assay IDs (alias: `assayids`)
        - Optional: `project_id`, `study_title`, `study_id`, `sop_id`, `assay_titles`

        ### Traditional 4-Sheet Format (sample-type-specific)

        Auto-detected when all 4 sheet names are present: `Instructions`, `Samples`, `Assay`, `Ontology`.
        **Each file must contain exactly one sample type.** Multiple types in INSTRUCTIONS = rejection.

        **Instructions sheet** -- Maps column headers to database fields:
        | Field | Database Field | Field Type | Ontology |
        |---|---|---|---|
        | Name | M.Mice::Name | Text | |
        | Strain | M.Mice::Strain | Controlled Ontology | Strain |

        Duplicate Field headers are rejected. `Database Field` format: `SampleType::AttributeName`.

        **Samples sheet** -- One row per sample. All non-empty columns become json_metadata. UID column required (even if empty for auto-generation).

        **Assay sheet** -- Links sample type to assays (SampleType, AssayType, Assay, Direction).

        **Ontology sheet** -- Controlled vocabularies. Validation is strict; violations reject the file.

        ## Notes

        - Column headers are case-insensitive and whitespace is trimmed (file upload mode).
        - Unknown extra columns are ignored, with a warning in the summary CSV.
        - Validation conflicts (e.g., UID mismatch) reject only that row; the job continues.
        - Auto-generated UIDs use format `{PREFIX}-{YYMMDD}{LABABBV}-{INDEX}`.
      tags:
      - batch-upload
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more Excel (.xlsx) files to upload.
                project_id:
                  type: integer
                  description: SEEK project ID to link samples to.
                person_id:
                  type: integer
                  description: SEEK person ID for contributor. Optional; defaults
                    to authenticated user.
                update_existing:
                  type: boolean
                  description: 'If true, update existing samples instead of skipping.
                    Default: false.'
                  default: false
                neo4j_only:
                  type: boolean
                  description: 'If true, skip SQL INSERT/UPDATE and only sync existing
                    samples to Neo4j. Default: false.'
                  default: false
                config_overrides:
                  type: object
                  additionalProperties: true
                  description: Optional config overrides (JSON object).
              required:
              - project_id
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUploadStartRequest'
      security:
      - tokenAuth: []
      - basicAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUploadStartResponse'
          description: ''
        '400':
          description: Missing input or structural error
        '401':
          description: Authentication required
        '413':
          description: Total upload size exceeds limit
        '422':
          description: Pydantic validation error on rows or request body
  /nextseek_api/batch-upload/status/{job_id}/:
    get:
      operationId: batch_upload_status_retrieve
      description: |
        **SUMMARY:** Get the status and progress of a batch upload job.

        **USE WHEN:** The user wants to check on the progress of a previously started batch upload.

        **ACCEPTS:** `job_id` as path parameter.

        **RETURNS:** Job state (`PENDING`, `STARTED`, `PROGRESS`, `SUCCESS`, `FAILURE`, `REVOKED`), progress metadata, and final result if complete.

        **TRIGGER PHRASES:** batch upload status, job progress, check upload, upload status, job state

        **EXAMPLES:**
        - 'What is the status of batch upload job abc123?'
        - 'Check the progress of my bulk upload'
        - 'Is the batch job done yet?'
      parameters:
      - in: path
        name: job_id
        schema:
          type: string
        required: true
      tags:
      - batch-upload
      security:
      - tokenAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUploadStatusResponse'
          description: ''
  /nextseek_api/batch-upload/summary/{job_id}/:
    get:
      operationId: batch_upload_summary_retrieve
      description: |
        **SUMMARY:** Download the summary CSV for a completed batch upload job.

        **USE WHEN:** The user wants to download the results/summary of a finished batch upload.

        **ACCEPTS:** `job_id` as path parameter.

        **RETURNS:** CSV file download with per-row upload results.

        **TRIGGER PHRASES:** batch upload summary, download results, upload report, batch results CSV

        **EXAMPLES:**
        - 'Download the summary for batch upload job abc123'
        - 'Get the results CSV from the completed bulk upload'
        - 'Show me the batch upload report'
      parameters:
      - in: path
        name: job_id
        schema:
          type: string
        required: true
      tags:
      - batch-upload
      security:
      - tokenAuth: []
      - basicAuth: []
      responses:
        '200':
          description: Summary CSV file download
  /nextseek_api/batch-upload/validate/:
    post:
      operationId: batch_upload_validate_create
      description: |
        **SUMMARY:** Synchronously validate a batch upload without creating anything. Runs the upload pipeline through the TRANSFORM stage and stops before INSERT.

        **USE WHEN:** A user wants to check an Excel file (or programmatic rows) for errors *before* committing a real upload via `POST batch-upload/start/`.

        **DO NOT USE WHEN:** The user actually wants to create samples -- use `POST batch-upload/start/` instead. Validation has no side effects: no job is created, no summary CSV is written, and no database rows are inserted or updated.

        **ACCEPTS:** Two input modes (same as `start/`; if both provided, rows takes priority):
        1. **Direct rows** (application/json): `rows` array of InputRowModel objects
        2. **File upload** (multipart/form-data): one or more `.xlsx` files under the `file` key

        Also requires `project_id` (integer; required, but no project mutation occurs). Optional `checks` (query or form param) -- a comma-separated subset of:
        - `structure` (default) -- CONVERT + the json_metadata attribute-name check. Fast.
        - `name_check` -- additionally check whether each sample Name already exists in the database (adds DB load proportional to row count).
        - `dag` -- additionally build the parent/child DAG and report orphans and cycles.

        **RETURNS:** `200 OK` with a `ValidationResult`: `valid` (bool), `summary` (one-line human string), `totals`, `errors[]`, `warnings`, `checks_run`, `checks_skipped`. No `job_id` and no `summary_path` (validation is synchronous -- the body is the result).

        **FILE SIZE LIMIT:** Total upload size must not exceed 200 MB (configurable via `BATCH_UPLOAD_MAX_TOTAL_BYTES`). Returns 413 if exceeded. File upload mode only.

        **ERROR CODES:**
        - 400: Missing input (no files/rows), missing project_id, or invalid `checks` value
        - 401: Authentication required
        - 413: Total upload size exceeds limit (file upload mode only)
        - 422: Pydantic validation error on rows or request body

        **TRIGGER PHRASES:** validate batch upload, pre-check spreadsheet, dry run upload, check Excel before upload, validate samples, batch upload validation

        **EXAMPLES:**
        - 'Validate this spreadsheet before I upload it for project 4475'
        - `curl -u user:pass -F 'file=@samples.xlsx' -F 'project_id=4475' 'https://host/nextseek_api/batch-upload/validate/?checks=structure,name_check'`
      tags:
      - batch-upload
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more Excel (.xlsx) files to validate.
                project_id:
                  type: integer
                  description: SEEK project ID. Required; no project mutation occurs.
                checks:
                  type: string
                  description: 'Comma-separated subset of: structure, name_check,
                    dag. Default: structure.'
                  default: structure
              required:
              - project_id
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUploadStartRequest'
      security:
      - tokenAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
              examples:
                ValidFile,Structure-only:
                  value:
                    job_id: null
                    summary_path: null
                    totals:
                      processed: 12
                      success: 12
                      skipped: 0
                      failed: 0
                      error: null
                      cancelled: false
                    errors: []
                    warnings: {}
                    valid: true
                    summary: No issues
                    checks_run:
                    - structure
                    checks_skipped:
                    - dag
                    - name_check
                  summary: Valid file, structure-only
                Attribute-nameTypo:
                  value:
                    job_id: null
                    summary_path: null
                    totals:
                      processed: 12
                      success: 11
                      skipped: 0
                      failed: 1
                      error: null
                      cancelled: false
                    errors:
                    - type: VALIDATION_ATTRIBUTE_NAME
                      message: '''Subjet ID'' is not a defined attribute for SampleType
                        ''NHP'''
                    warnings: {}
                    valid: false
                    summary: 1 error found
                    checks_run:
                    - structure
                    checks_skipped:
                    - dag
                    - name_check
                  summary: Attribute-name typo
          description: Validation result (synchronous).
        '400':
          description: Missing input, missing project_id, or invalid checks value
        '401':
          description: Authentication required
        '413':
          description: Total upload size exceeds limit
        '422':
          description: Pydantic validation error on rows or request body
  /nextseek_api/data_files/:
    get:
      operationId: List DataFiles
      description: |
        **SUMMARY:** List all data files accessible to the current user.

        **USE WHEN:** The user wants to browse all available data files (spreadsheets, images, sequencing outputs, etc.).

        **ACCEPTS:** No required parameters; supports pagination query params.

        **RETURNS:** Paginated list of data file records with titles, descriptions, `content_type`, and linked projects/assays.

        **TRIGGER PHRASES:** list data files, show files, all uploads, available data, browse files

        **EXAMPLES:**
        - 'Show me all uploaded data files'
        - 'What sequencing results are available for download?'
        - 'List all data files in the system'
      tags:
      - DataFiles
