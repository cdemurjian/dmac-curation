                LineageResponse:
                  value:
                    total_trees: 1
                    trees:
                    - input_id: NHP-220630FLY-1-PUB
                      resolved_id: '1506'
                      total_nodes: 5
                      total_rels: 4
                      nodes:
                      - id: '1506'
                        uuid: NHP-220630FLY-1-PUB
                        sample_type: NHP
