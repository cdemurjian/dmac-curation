          anyOf:
          - type: integer
          - const: ALL
            type: string
          default: 5
          description: Maximum number of endpoints to return. Use 'ALL' to return
            all matching endpoints up to the ingestion ceiling.
          title: Top K
        min_score:
          anyOf:
          - type: number
          - type: 'null'
          default: null
          description: Minimum similarity score threshold
          title: Min Score
        include_debug:
          default: true
          description: Whether to include debug info in response
          title: Include Debug
          type: boolean
        filter_by:
          anyOf:
          - enum:
            - METHOD
            - TAG
            type: string
          - type: 'null'
          default: null
          description: 'Filter type: ''METHOD'' to filter by HTTP method, ''TAG''
            to filter by endpoint tag'
          title: Filter By
        filter_terms:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          default: null
          description: 'Values to filter by. For METHOD: HTTP methods (GET, POST,
            etc.). For TAG: tag names.'
          title: Filter Terms
      required:
      - query
      title: RetrieveRequest
      type: object
