  /nextseek_api/entity_tree/lineage/:
    post:
      operationId: Get Sample Lineage Trees
      description: |
        **SUMMARY:** Retrieve full lineage trees for one or more samples with optional edge enrichment.

        **USE WHEN:** The user wants complete upstream and downstream lineage for MULTIPLE samples at once, or needs edge attribute enrichment (`study_titles`, `description`) on the lineage.

        **DO NOT USE WHEN:** The user wants a simple tree for ONE sample without edge enrichment — use `GET sample-tree/{uid}/tree` instead.

        **ACCEPTS:** List of `sample_ids` (UIDs or SEEK IDs); optional `include_attributes` flag; optional `timeout`.

        **RETURNS:** Array of lineage trees, each with nodes (`id`, `uuid`, `sample_type`, `color`, `parentIds`) and relationships (`child_id`, `parent_id`, assay info, optional `study_titles`/`description`).

        **TRIGGER PHRASES:** sample lineage batch, multiple sample trees, lineage for several samples, bulk lineage

        **EXAMPLES:**
        - 'Show me all samples derived from NHP-220630FLY-1-PUB'
        - 'Get the full lineage for tissue samples TIS-230324BOO-39-PUB and TIS-230324BOO-40-PUB'
        - 'Retrieve lineage trees for these three samples with edge attributes'
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Page number for node pagination within each tree (1-indexed)
      - in: query
        name: page_size
        schema:
          type: integer
        description: Number of nodes per page within each tree (default 100, max 1000)
      tags:
      - EntityTree
      requestBody:
