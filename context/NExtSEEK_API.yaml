    BatchUploadError:
      description: |-
        One entry in the orchestrator's terminal ``errors[]`` list.

        Produced by ErrorCollector during pipeline execution and projected to this
        public shape before being returned as part of BatchUploadResult /
        ValidationResult. ``row`` and ``uid`` locate the offending row when the
        error is attributable to one; both are None for whole-file or stage-level
        errors. The internal RowError additionally carries ``severity``, which is
        not surfaced here.
      properties:
        type:
          description: ErrorType enum value, e.g. 'VALIDATION_ATTRIBUTE_NAME'.
          title: Type
          type: string
        message:
          description: Human-readable error message.
          title: Message
          type: string
        row:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          description: 0-based row index of the offending row within the SAMPLES data,
            when the error is attributable to a specific row. None for whole-file
            / stage-level errors.
          title: Row
        uid:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: UID of the offending row, when it has one (update rows, or
            rows with a pre-assigned UID). New samples have no UID at validation time,
            so this is None for them — use `row` to locate them.
          title: Uid
      required:
      - type
      - message
      title: BatchUploadError
      type: object
    BatchUploadErrorGroup:
      description: |-
        A set of /validate/ errors collapsed by identical ``(type, message)``.

        Issue C of the 2026-05-22 /validate/ UI handoff: a sheet where many rows
        fail the same check produced one flat ``BatchUploadError`` per row —
        visually identical lines differing only in ``row``. Grouping by
        ``(type, message)`` gives the UI one block per distinct failure while
        ``count`` / ``rows`` / ``uids`` preserve which rows were affected.

        This is a presentation aid layered on top of the flat ``errors`` list; it
        is NOT a cap — ``errors`` still carries every error (see Issue B).
      properties:
        type:
          description: ErrorType enum value shared by every error in the group.
          title: Type
          type: string
        message:
          description: Human-readable message shared by every error in the group.
          title: Message
          type: string
        count:
          description: Number of errors in the group.
          title: Count
          type: integer
        rows:
          description: Sorted, de-duplicated 0-based row indices of the affected rows.
            Row-less (whole-file) errors contribute to `count` but not here.
          items:
            type: integer
          title: Rows
          type: array
        uids:
          description: Sorted, de-duplicated UIDs of affected rows that had a pre-assigned
            one.
          items:
            type: string
          title: Uids
          type: array
      required:
      - type
      - message
      - count
      title: BatchUploadErrorGroup
      type: object
    BatchUploadStartRequest:
      properties:
        rows:
          anyOf:
          - items:
              $ref: '#/components/schemas/InputRowModel'
            type: array
          - type: 'null'
          default: null
          description: 'List of InputRowModel objects for direct programmatic upload.
            Bypasses Excel file parsing. Each object must have at minimum: SampleType
            (str), json_metadata (str or dict). Optional: UID, assay_ids, project_id
            (overrides top-level), study_title, study_id, sop_id, assay_titles.'
          title: Rows
        project_id:
          description: SEEK project ID to link samples to.
          title: Project Id
          type: integer
        update_existing:
          default: false
          description: If true, existing samples (by UUID or Name match) are updated
            instead of skipped.
          title: Update Existing
          type: boolean
        neo4j_only:
          default: false
          description: If true, skip SQL INSERT/UPDATE stages and only sync existing
            samples to Neo4j. Assumes all samples already exist in the database. Rows
            must have pre-assigned UIDs.
          title: Neo4J Only
          type: boolean
        person_id:
