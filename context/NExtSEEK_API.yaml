          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: Schema URL to look up existing session
          title: Schema Url
        query:
          description: Natural language query describing the desired operation
          title: Query
          type: string
        resolved_terms:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          description: Pre-resolved entity terms
          title: Resolved Terms
