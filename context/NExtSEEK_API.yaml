    ValidationResult:
      description: |-
        Response shape for POST /api/batch-upload/validate/.

        Extends BatchUploadResult with four validation-specific fields:
        valid, summary, checks_run, checks_skipped. Inherits all pipeline-result
        fields (totals, errors, warnings) so consumers see one flat object — no
        nested ``result`` wrapper.

        Production by ``run_validation_multi``: orchestrator dict is converted via
        ``BatchUploadResult.model_validate``, the four extra fields are computed
        from the validation flow, and the combined model is returned to the
        /validate/ view.

        See ALSO the existing dataclass ``BatchResult`` (this module) — different
        concept; it is INSERT-stage internal state, not a pipeline result.
      properties:
        job_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: Celery task UUID. None for sync /validate/ responses.
          title: Job Id
        summary_path:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: On-disk path to the summary CSV. None for /validate/ (no CSV
            written).
          title: Summary Path
        totals:
          $ref: '#/components/schemas/BatchUploadTotals'
        errors:
          items:
            $ref: '#/components/schemas/BatchUploadError'
          title: Errors
          type: array
        warnings:
          additionalProperties: true
          description: Free-form warnings keyed by category (e.g. 'convert_warnings').
          title: Warnings
          type: object
        valid:
          description: True iff `errors` is empty AND `totals.error` is None.
          title: Valid
          type: boolean
        summary:
          description: One-line human summary, e.g. '2 distinct errors (5 total)'
            or 'No issues'.
          title: Summary
          type: string
        checks_run:
          description: Validation stages that executed for this request.
          items:
            type: string
          title: Checks Run
          type: array
        checks_skipped:
          description: Stages NOT requested via the `checks` parameter.
          items:
            type: string
          title: Checks Skipped
          type: array
        error_groups:
          description: '`errors` collapsed by identical (type, message); each group
            lists every affected row/uid. A presentation aid — `errors` remains the
            complete, uncapped list. Empty when there are no errors.'
          items:
            $ref: '#/components/schemas/BatchUploadErrorGroup'
          title: Error Groups
          type: array
      required:
      - totals
      - valid
      - summary
      - checks_run
      title: ValidationResult
      type: object
