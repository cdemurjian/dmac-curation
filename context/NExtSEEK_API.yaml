  /nextseek_api/schema_rag/ingest/:
    post:
      operationId: Ingest OpenAPI Schema
      description: |
        **SUMMARY:** Ingest an OpenAPI schema from a URL for semantic retrieval.

        **USE WHEN:** The system needs to load and index an OpenAPI specification for subsequent endpoint retrieval queries. Creates a session with configurable TTL.

        **ACCEPTS:** `schema_url` (URL to an OpenAPI YAML/JSON spec); optional `ttl_minutes` (default 15).

        **RETURNS:** `session_id`, `schema_url`, TTL, `expires_at`, and `num_endpoints` ingested.

        **TRIGGER PHRASES:** ingest schema, load API spec, index OpenAPI, schema RAG ingest

        **EXAMPLES:**
        - 'Ingest the SEEK OpenAPI schema for endpoint retrieval'
        - 'Load the NExtSEEK API spec from the dev server'
      tags:
      - Schema RAG
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
            examples:
              IngestSEEKOpenAPISchema:
                value:
                  schema_url: https://fairdomhub.org/api/definitions/openapi-v3-resolved.yaml
                  ttl_minutes: 30
                summary: Ingest SEEK OpenAPI Schema
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IngestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IngestRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
              examples:
                IngestSuccessResponse:
                  value:
                    session_id: abc123def456
                    schema_url: https://fairdomhub.org/api/definitions/openapi-v3-resolved.yaml
                    ttl_minutes: 30
                    expires_at: '2024-01-15T12:30:00Z'
                    num_endpoints: 150
                  summary: Ingest Success Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Schema too large - exceeds maximum endpoint limit
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Authentication required
          description: ''
        '422':
          content:
            application/json:
              schema:
                description: Invalid request payload
          description: ''
        '502':
          content:
            application/json:
              schema:
                description: Failed to fetch or parse schema from URL
          description: ''
  /nextseek_api/schema_rag/retrieve/:
    post:
      operationId: Retrieve API Endpoints
      description: |
        **SUMMARY:** Retrieve relevant API endpoints from an ingested schema using semantic search.

        **USE WHEN:** The system needs to find which API endpoints are relevant to a natural language query, using a previously ingested schema session.

        **ACCEPTS:** `session_id` or `schema_url`, query text, `mode` (`minimal`/`full`), `top_k`, optional filters (`METHOD`, `TAG`), optional `resolved_terms` for boosting, `min_score` threshold.

        **RETURNS:** Ranked list of matching endpoints in `minimal` (`operationId`, `method`, `path`) or `full` mode (includes `request_schema`, `parameters`, `examples`). Optional debug info.

        **TRIGGER PHRASES:** retrieve endpoints, find API endpoint, schema RAG retrieve, which endpoint, route query

        **EXAMPLES:**
        - 'Find the endpoint for creating a new sample'
        - 'Which API endpoint handles searching samples by attribute?'
        - 'Retrieve endpoints related to project management'
      tags:
      - Schema RAG
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveRequest'
            examples:
              RetrieveBySessionID:
                value:
                  session_id: abc123def456
                  query: How do I create a new sample?
                  mode: minimal
                  top_k: 5
                  include_debug: true
                summary: Retrieve by Session ID
              RetrieveBySchemaURL:
                value:
                  schema_url: https://fairdomhub.org/api/definitions/openapi-v3-resolved.yaml
                  query: Get all projects for a user
                  mode: full
                  top_k: 3
                  resolved_terms:
                    project: research project
                    user: person
                summary: Retrieve by Schema URL
              NExtSEEKFullModeQuery:
                value:
                  schema_url: https://nextseek-dev.mit.edu/nextseek_api/schema/?format=yaml
                  query: Find all mice from water study that were treated with NDMA
                  mode: full
                  top_k: 2
                  min_score: 0.3
                summary: NExtSEEK Full Mode Query
              FilterByHTTPMethod(GETOnly,ReturnALL):
                value:
                  schema_url: https://fairdomhub.org/api/definitions/openapi-v3-resolved.yaml
                  query: List available resources
                  filter_by: METHOD
                  filter_terms:
                  - GET
                  top_k: ALL
                summary: Filter by HTTP Method (GET only, return ALL)
              FilterByTag:
                value:
                  session_id: abc123def456
                  query: How do I manage samples?
                  filter_by: TAG
                  filter_terms:
                  - Samples
                  top_k: 5
                summary: Filter by Tag
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RetrieveRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RetrieveRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveResponse'
              examples:
                FullModeResponseWithMultipleEndpoints:
                  value:
                    session_id: ce1817b6ebcd43fab8af80c9fe708844
                    mode: full
                    endpoints_full:
                    - operationId: Get samples with children of specified sample types
                      method: POST
                      tags:
                      - SampleTypes
                      description: Return parent samples (SEEK id and UID) that have
                        at least one descendant with each specified sample type. Logical
                        AND across provided types.
                      path: /nextseek_api/sample_types/get_parents/parents_by_child_types/
                      request_schema:
                        sample_type_titles:
                        - array
                        - 'null'
                        sample_type_ids:
                        - array
                        - 'null'
                      examples:
                      - '{"sample_type_titles":["D.IMG","TIS"]}'
                      - '{"sample_type_ids":[14,2]}'
                    - operationId: Get Sample Tree by id or uid
                      method: GET
                      tags:
                      - Samples
                      description: Get sample tree by SEEK id (numeric) or Sample
                        UID (string)
                      path: /nextseek_api/sample-tree/{uid}/tree/
                      parameters:
                        uid:
                          in: path
                          required: true
                          type: string
